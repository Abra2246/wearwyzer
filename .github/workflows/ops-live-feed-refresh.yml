name: Ops Live Feed Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate and print the live feed without committing"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths-ignore:
      - 'ops/live-feed.json'
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: ops-live-feed-refresh
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read
  deployments: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Generate ops/live-feed.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/ops-live-cli.mjs --dry-run
          else
            node scripts/ops-live-cli.mjs
          fi

      - name: Commit and push if changed
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true) }}
        run: |
          if git diff --quiet -- ops/live-feed.json; then
            echo "No change to ops/live-feed.json — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/live-feed.json
          git commit -m "chore(ops): refresh live-feed.json"
          git push
