name: Ops Live Feed Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate and print the live feed without committing"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths-ignore:
      - 'ops/live-feed.json'
  schedule:
    - cron: '*/5 * * * *'

concurrency:
  group: ops-live-feed-refresh
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read
  deployments: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Generate ops/live-feed.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/ops-live-cli.mjs --dry-run
          else
            node scripts/ops-live-cli.mjs
          fi

      - name: Commit and push if changed
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run == true) }}
        run: |
          if git diff --quiet -- ops/live-feed.json; then
            echo "No change to ops/live-feed.json — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/live-feed.json
          git commit -m "chore(ops): refresh live-feed.json"
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            git fetch --no-tags origin main
            if ! git rebase origin/main; then
              echo "::error::Generated live-feed commit conflicts with current main; refusing to discard either change."
              git rebase --abort || true
              exit 1
            fi
            if git push origin HEAD:main; then
              exit 0
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::Could not push live-feed after $max_attempts attempts because main kept advancing."
              exit 1
            fi
            echo "main advanced during push; retrying after fetch/rebase ($attempt/$max_attempts)."
          done
