name: Deploy to GitHub Pages

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate guide/product data integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js (current LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run content data validator
        run: node scripts/validate-content-data.mjs

      - name: Run static-site QA check
        run: node scripts/qa-static-site.mjs

      - name: Run Knowledge Graph validator
        run: node scripts/validate-knowledge-graph.mjs

  build:
    name: Build Pages artifact
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
          # .nojekyll must survive the archive step, or GitHub Pages runs the
          # site through Jekyll and mishandles files like "Site Nav.dc.html".
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
