name: Ops Status Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate and print status without committing"
        type: boolean
        default: false
  push:
    branches:
      - main
    paths-ignore:
      - 'ops/status.json'
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: ops-status-refresh
  cancel-in-progress: true

permissions:
  contents: write
  issues: read
  pull-requests: read
  actions: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (current LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Generate ops/status.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/ops-status-cli.mjs ${{ inputs.dry_run == true && '--dry-run' || '' }}

      - name: Commit and push if changed
        if: ${{ inputs.dry_run != true }}
        run: |
          if git diff --quiet -- ops/status.json; then
            echo "No change to ops/status.json — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/status.json
          git commit -m "chore(ops): refresh status.json"
          git push