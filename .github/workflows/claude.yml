name: Claude Code

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number claimed by the autonomous queue"
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: ${{ github.event_name == 'workflow_dispatch' && format('Implement GitHub issue #{0} exactly as scoped. Read the issue body and repository instructions, create a dedicated branch, run all required validation, open a pull request into main that includes Closes #{0}, and stop for human review. Do not merge or publish externally.', inputs.issue_number) || '' }}

          additional_permissions: |
            actions: read
            checks: read

          # Pre-approve routine development and validation commands so cloud
          # implementation can complete without interactive approval. Keep
          # workflow editing, secret management, destructive commands, and
          # production release outside this allowlist.
          claude_args: >-
            --allowed-tools
            "Bash(node *),Bash(npm *),Bash(npx *),Bash(python3 *),Bash(git status*),Bash(git diff*),Bash(git log*),Bash(git branch*),Bash(git switch*),Bash(git checkout*),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(gh issue *),Bash(gh pr view*),Bash(gh pr create*),Bash(gh pr checks*),Bash(gh run view*),Bash(gh run list*),Bash(curl http://localhost:*),Bash(curl -I http://localhost:*),Bash(bash scripts/*),Bash(./scripts/*)"
