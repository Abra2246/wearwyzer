name: Guide Factory Dispatcher

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without writing job status or opening an issue"
        type: boolean
        default: false
  schedule:
    - cron: '47 * * * *'

concurrency:
  group: guide-factory-dispatcher
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (current LTS)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Run the next approved guide job
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/guide-factory-cli.mjs ${{ inputs.dry_run == true && '--dry-run' || '' }}
