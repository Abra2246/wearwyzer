<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&amp;display=swap" rel="stylesheet">
</helmet>
<footer style="background:#0B0B0B;color:#F6F1E8;font-family:ui-sans-serif,system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
  <div style="max-width:1200px;margin:0 auto;padding:56px 20px 32px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;padding-bottom:40px;border-bottom:1px solid #2a2a26">
      <div>
        <p style="display:flex;align-items:center;gap:10px;font-family:'Oswald',Impact,sans-serif;font-weight:700;font-size:22px;letter-spacing:1.5px;margin:0 0 10px">
          <img src="assets/logo/wearwyzer-mark-white.png" alt="" width="834" height="562" style="height:26px;width:auto;display:block">
          WEAR<span style="color:#C8941E">WYZER</span>
        </p>
        <p style="font-size:14px;color:#a8a49c;margin:0;line-height:1.6;max-width:280px">You bought it. Now wear it wyzer.</p>
      </div>
      <nav aria-label="Footer navigation">
        <p style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8941E;margin:0 0 14px">Explore</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="guides.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Style Guides</a>
          <a href="shop.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Shop</a>
          <a href="products.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Featured Products</a>
          <a href="about.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">About</a>
          <a href="contact.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Contact</a>
        </div>
      </nav>
      <nav aria-label="Legal">
        <p style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8941E;margin:0 0 14px">Legal</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="affiliate-disclosure.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Affiliate Disclosure</a>
          <a href="privacy.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Privacy Policy</a>
          <a href="terms.dc.html" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Terms</a>
        </div>
      </nav>
      <div>
        <p style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C8941E;margin:0 0 14px">Follow</p>
        <div style="display:flex;flex-direction:column;gap:10px">
          <a href="{{ instagramUrl }}" rel="noopener" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">Instagram — @wearwyzer</a>
          <a href="{{ mailto }}" style="color:#d8d4cc;text-decoration:none;font-size:14px" style-hover="color:#C8941E">{{ contactEmail }}</a>
        </div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;padding-top:24px">
      <p style="font-size:12px;color:#78746c;margin:0">© {{ year }} WearWyzer. All rights reserved.</p>
      <p style="font-size:12px;color:#78746c;margin:0;max-width:520px">{{ disclosure }}</p>
    </div>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:360}}">
class Component extends DCLogic {
  state = { site: null };
  async componentDidMount() {
    const m = await import('./js/site-data.js');
    this.setState({ site: m.site });
  }
  renderVals() {
    const s = this.state.site;
    return {
      year: new Date().getFullYear(),
      instagramUrl: s ? s.instagramUrl : '#',
      contactEmail: s ? s.contactEmail : '',
      mailto: s ? 'mailto:' + s.contactEmail : '#',
      disclosure: s ? s.affiliateDisclosure : '',
    };
  }
}
</script>
</body>
</html>
